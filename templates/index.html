<!doctype html>
<html>
  <head>
    <title>AI Audit Analyzer</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 40px;
      }

      h2 {
        color: #2c3e50;
      }

      textarea {
        width: 500px;
        height: 120px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      button {
        margin-top: 10px;
        margin-right: 10px;
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #2980b9;
      }

      .history-btn {
        background: #2ecc71;
      }

      .history-btn:hover {
        background: #27ae60;
      }

      #output {
        margin-top: 20px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        width: 500px;
        box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
      }

      h4 {
        margin-bottom: 5px;
        color: #34495e;
      }

      ul {
        padding-left: 20px;
      }

      .loading {
        color: #888;
        font-style: italic;
      }

      .history-item {
        border-bottom: 1px solid #eee;
        margin-bottom: 10px;
        padding-bottom: 10px;
      }

      .error {
        color: red;
        font-weight: bold;
      }

      .success {
        color: green;
      }
    </style>
  </head>

  <body>
    <h2>🤖 AI Audit Analyzer</h2>

    <textarea
      id="inputText"
      placeholder="Enter audit issue..."
    ></textarea><br />

    <!-- Buttons -->
    <button type="button" onclick="analyze()">Analyze</button>

    <button type="button" class="history-btn" onclick="loadHistory()">
      View History
    </button>

    <div id="output"></div>

    <script>
      const BASE_URL = window.location.origin;

      async function analyze() {
        const text = document.getElementById("inputText").value.trim();

        if (!text) {
          alert("Please enter some text");
          return;
        }

        document.getElementById("output").innerHTML =
          "<p class='loading'>Analyzing... ⏳</p>";

        try {
          const response = await fetch(`${BASE_URL}/analyze`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ text }),
          });

          const result = await response.json();

          console.log("API Response:", result);

          if (!result.data) {
            throw new Error("Invalid API response");
          }

          // ✅ Handle recommendations safely
          let recommendationsHTML = "";

          if (
            Array.isArray(result.data.recommendations) &&
            result.data.recommendations.length > 0
          ) {
            recommendationsHTML = result.data.recommendations
              .map((r) => {
                // Handle string recommendation
                if (typeof r === "string") {
                  return `<li>${r}</li>`;
                }

                // Handle object recommendation
                if (typeof r === "object") {
                  return `<li>${
                    r.recommendation ||
                    r.text ||
                    JSON.stringify(r)
                  }</li>`;
                }

                return `<li>${r}</li>`;
              })
              .join("");
          } else {
            recommendationsHTML =
              "<li>No recommendations available</li>";
          }

          document.getElementById("output").innerHTML = `
            <h4>📌 Issue Summary:</h4>
            <p>${result.data.issue_summary || "N/A"}</p>

            <h4>⚠️ Impact:</h4>
            <p>${result.data.impact || "N/A"}</p>

            <h4>✅ Recommendation:</h4>
            <p>${result.data.recommendation || "N/A"}</p>

            <h4>📋 Detailed Recommendations:</h4>
            <ul>
              ${recommendationsHTML}
            </ul>

            <p class="success">
              Generated Successfully ✅
            </p>
          `;
        } catch (error) {
          console.error(error);

          document.getElementById("output").innerHTML = `
            <p class="error">
              Error fetching response from server
            </p>
          `;
        }
      }

      async function loadHistory() {
        document.getElementById("output").innerHTML =
          "<p class='loading'>Loading history... 📜</p>";

        try {
          const response = await fetch(`${BASE_URL}/history`);

          const data = await response.json();

          // Handle different response structures
          const history = data.data || data;

          if (!Array.isArray(history) || history.length === 0) {
            document.getElementById("output").innerHTML =
              "<p>No history found</p>";
            return;
          }

          let html = "<h3>📜 History</h3>";

          history
            .slice()
            .reverse()
            .forEach((item) => {
              html += `
                <div class="history-item">
                  <p><b>Input:</b> ${item.input || "N/A"}</p>

                  <p><b>Issue:</b>
                    ${
                      item.output?.issue_summary || "N/A"
                    }
                  </p>

                  <p><b>Impact:</b>
                    ${
                      item.output?.impact || "N/A"
                    }
                  </p>

                  <p><b>Recommendation:</b>
                    ${
                      item.output?.recommendation || "N/A"
                    }
                  </p>

                  <p><b>Timestamp:</b>
                    ${
                      item.timestamp || "N/A"
                    }
                  </p>
                </div>
              `;
            });

          document.getElementById("output").innerHTML = html;
        } catch (error) {
          console.error(error);

          document.getElementById("output").innerHTML = `
            <p class="error">
              Error loading history
            </p>
          `;
        }
      }
    </script>
  </body>
</html>
